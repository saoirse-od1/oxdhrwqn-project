<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>oxdhrwqn project</title>
  <style>
    :root {
      --bg1: #f5f7ff;
      --bg2: #e8fff4;
      --ink: #15202b;
      --card: #ffffffcc;
      --accent: #0f766e;
    }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      min-height: 100vh;
      background: radial-gradient(circle at 15% 20%, var(--bg2), transparent 45%),
                  radial-gradient(circle at 85% 15%, #fff7e6, transparent 35%),
                  linear-gradient(135deg, var(--bg1), #ffffff);
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: var(--card);
      border: 1px solid #d9e2ec;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; font-size: clamp(1.8rem, 4vw, 2.8rem); }
    p { line-height: 1.65; font-size: 1.05rem; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <h1>My GitHub Pages Site</h1>
    <p>This site is published from the <strong>oxdhrwqn-project</strong> repository.</p>
    <p>If you can read this page, GitHub Pages is working.</p>
  </main>
</body>
</html>
